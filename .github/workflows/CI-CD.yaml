name: Spring Boot CI/CD - Render

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build jar
        run: mvn clean package -DskipTests

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
